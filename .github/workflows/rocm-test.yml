name: ROCm Test Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC
  pull_request:
    paths:
      - 'lib/kvbm-kernels/hip/**'
      - 'lib/memory/src/gpu/**'
      - 'lib/kv-router/src/**'
      - 'components/src/dynamo/sglang/**'
      - 'components/src/dynamo/common/**'
      - 'tests/**'
      - 'container/templates/*Dockerfile*'
      - 'examples/backends/sglang/launch/rocm/**'
      - 'examples/common/rocm_utils.sh'
  push:
    branches: [amd-additive]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# --------------------------------------------------------------------------
# Tier 1: Pre-merge — unit tests, no GPU required (~5 min)
# --------------------------------------------------------------------------
jobs:
  tier1-unit-tests:
    name: "Tier 1: ROCm Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          pip install pytest pydantic pyyaml msgspec pandas pyzmq filelock nats-py

      - name: Install dynamo (editable, no Rust bindings)
        run: |
          pip install -e ".[dev]" --no-build-isolation 2>&1 | tail -5 || \
          pip install -e . 2>&1 | tail -5
        continue-on-error: true

      - name: ROCm build checks
        run: |
          # Verify HIP kernel source exists
          test -f lib/kvbm-kernels/hip/tensor_kernels.hip
          echo "PASS: HIP kernel source exists"

          # Verify ROCm Cargo features
          grep -q 'rocm' lib/memory/Cargo.toml
          echo "PASS: Memory crate has rocm feature"

          # Verify Dockerfile ROCm blocks
          grep -q 'rocm' container/templates/vllm_runtime.Dockerfile
          echo "PASS: Dockerfile check complete"

      - name: Run Planner unit tests
        run: |
          pytest tests/planner/unit/test_planner_config.py \
                 tests/planner/unit/test_load_predictors.py \
                 tests/planner/unit/test_remote_planner.py \
                 tests/mocker/test_config.py \
                 --override-ini=filterwarnings=default \
                 -v --tb=short \
                 -k "not (vllm or trtllm)"

  # --------------------------------------------------------------------------
  # Tier 2: Post-merge nightly — GPU tests on MI355X (~30 min)
  # --------------------------------------------------------------------------
  tier2-gpu-tests:
    name: "Tier 2: ROCm GPU Tests"
    runs-on: [self-hosted, rocm, mi355x]
    if: github.event_name == 'push'
    timeout-minutes: 45
    container:
      image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
      options: >-
        --device=/dev/kfd
        --device=/dev/dri
        --device=/dev/infiniband
        --group-add video
        --shm-size 256G
        --ipc=host
        --cap-add=SYS_PTRACE
        --security-opt seccomp=unconfined
    env:
      SGLANG_AITER_MLA_PERSIST: "False"
      SGLANG_USE_AITER: "1"
      RCCL_MSCCL_ENABLE: "0"
      HIP_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust toolchain and cargo
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/bin
            /root/.cargo/registry
            /root/.rustup
            target/
          key: rocm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rocm-cargo-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: /root/.cache/pip
          key: rocm-pip-${{ hashFiles('**/requirements*.txt', '**/constraints*.txt') }}
          restore-keys: rocm-pip-

      - name: GPU Detection
        run: |
          rocm-smi --showproductname | head -10
          python3 -c "import torch; print(f'PyTorch {torch.__version__}, GPUs: {torch.cuda.device_count()}')"

      - name: Build Dynamo
        run: |
          apt-get update -qq && apt-get install -y -qq build-essential pkg-config libclang-dev protobuf-compiler > /dev/null 2>&1
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.1 -q 2>&1 | tail -1
          fi
          export PATH=/root/.cargo/bin:$PATH LIBCLANG_PATH=/opt/rocm/lib/llvm/lib
          cd lib/bindings/python && maturin develop --release 2>&1 | tail -3
          cd ../../.. && pip install -e . 2>&1 | tail -2

      - name: ROCm GPU Detection Tests
        run: |
          pytest tests/basic/test_rocm_gpu_detection.py -v --tb=short

      - name: ROCm Version Consistency
        run: |
          pytest tests/basic/test_rocm_version_consistency.py -v --tb=short

      - name: HIP Kernel Compilation
        run: |
          /opt/rocm/bin/hipcc -c -std=c++17 -O3 -fPIC \
            --offload-arch=gfx950 \
            lib/kvbm-kernels/hip/tensor_kernels.hip \
            -o /tmp/tensor_kernels.o
          echo "HIP kernel compilation: PASS"

      - name: Router Mocker E2E
        run: |
          pytest tests/router/test_router_e2e_with_mockers.py \
            -k "test_mocker_router[kv-nondurable-tcp]" \
            -v --tb=short --timeout=120

      - name: Router Block Size Regression
        run: |
          pytest tests/router/test_router_block_size_regression.py -v --tb=short

      - name: SGLang Serve (aggregated)
        run: |
          pytest tests/serve/test_sglang_rocm.py \
            -k "rocm_aggregated" \
            -v --tb=short --timeout=300

      - name: Ionic NIC Validation
        run: |
          pytest tests/disagg/test_ionic_validation.py -v --tb=short

      - name: FPM Relay Tests
        run: |
          pytest tests/planner/test_fpm_relay_sglang.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rocm-tier2-results-${{ github.sha }}
          path: |
            .pytest_cache/
            test_results*.log
          retention-days: 30

  # --------------------------------------------------------------------------
  # Tier 3: Weekly — multi-node disagg tests (~2 hr)
  # --------------------------------------------------------------------------
  tier3-multinode:
    name: "Tier 3: Multi-Node Disagg"
    runs-on: [self-hosted, rocm, mi355x-disagg]
    if: github.event_name == 'push' && github.ref == 'refs/heads/amd-additive'
    timeout-minutes: 150
    env:
      SGLANG_AITER_MLA_PERSIST: "False"

    steps:
      - uses: actions/checkout@v4

      - name: MoRI RDMA Disagg Tests
        run: |
          if [ -n "$DISAGG_PREFILL_HOST" ]; then
            pytest tests/disagg/test_mori_rdma.py -v --tb=short
          else
            echo "DISAGG_PREFILL_HOST not set — skipping multi-node tests"
          fi

  # --------------------------------------------------------------------------
  # Nightly: Full suite on MI355X (~30 min)
  # --------------------------------------------------------------------------
  nightly-full-suite:
    name: "Nightly: Full ROCm Test Suite"
    runs-on: [self-hosted, rocm, mi355x]
    if: github.event_name == 'schedule'
    timeout-minutes: 60
    container:
      image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
      options: >-
        --device=/dev/kfd
        --device=/dev/dri
        --device=/dev/infiniband
        --group-add video
        --shm-size 256G
        --ipc=host
        --cap-add=SYS_PTRACE
        --security-opt seccomp=unconfined
    env:
      SGLANG_AITER_MLA_PERSIST: "False"
      RCCL_MSCCL_ENABLE: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Build Dynamo (with kv-indexer)
        run: |
          apt-get update -qq && apt-get install -y -qq build-essential pkg-config libclang-dev protobuf-compiler --quiet
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.1 -q 2>&1 | tail -1
          fi
          export PATH=/root/.cargo/bin:$PATH LIBCLANG_PATH=/opt/rocm/lib/llvm/lib
          cd lib/bindings/python
          NIXL_PREFIX=/opt/rocm/rixl maturin build --release --features "kv-indexer,kv-indexer-runtime" --out /tmp/dist 2>&1 | tail -3
          pip install /tmp/dist/ai_dynamo_runtime*.whl 2>&1 | tail -2
          cd ../../.. && pip install -e . 2>&1 | tail -2
          pip install -q -c container/constraints-rocm.txt pytest pytest-benchmark pytest-httpserver pytest-asyncio pytest-timeout nats-py

      - name: Full test suite
        run: |
          python3 -m pytest \
            tests/basic/ \
            tests/disagg/ \
            tests/router/ \
            tests/frontend/ \
            tests/mocker/ \
            tests/planner/unit/ \
            tests/planner/test_fpm_relay_sglang.py \
            tests/planner/test_replica_calculation.py \
            tests/planner/test_load_generator.py \
            tests/global_planner/unit/ \
            tests/serve/test_prometheus_exposition_format_injection.py \
            tests/test_predownload_models.py \
            --override-ini=filterwarnings=default \
            -v --tb=short --timeout=300 \
            --junitxml=test-results-nightly.xml

      - name: Upload nightly results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rocm-nightly-${{ github.run_number }}
          path: test-results-nightly.xml
          retention-days: 90
