#
# Disaggregated SGLang deployment on AMD MI355X GPUs with MoRI RDMA.
# NOTE: apiVersion nvidia.com/v1alpha1 is the Dynamo CRD API group — it is
# vendor-neutral and works on AMD clusters with the Dynamo Operator installed.

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: sglang-rocm-disagg
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
          command:
          - python3
          - -m
          - dynamo.frontend
          args:
            - --router-mode
            - kv
            - --kv-cache-block-size
            - "16"
    SglangPrefillWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      envs:
        - name: DYN_SYSTEM_ENABLED
          value: "true"
        - name: SGLANG_AITER_MLA_PERSIST
          value: "False"
        - name: SGLANG_USE_AITER
          value: "1"
        - name: RCCL_MSCCL_ENABLE
          value: "0"
      extraPodSpec:
        mainContainer:
          image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
          command:
          - python3
          - -m
          - dynamo.sglang
          args:
            - --model-path
            - Qwen/Qwen3-0.6B
            - --tp-size
            - "1"
            - --page-size
            - "16"
            - --disaggregation-mode
            - prefill
            - --disaggregation-transfer-backend
            - mori
            - --trust-remote-code
          securityContext:
            privileged: true
          resources:
            requests:
              amd.com/gpu: "1"
            limits:
              amd.com/gpu: "1"
    SglangDecodeWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      envs:
        - name: DYN_SYSTEM_ENABLED
          value: "true"
        - name: SGLANG_AITER_MLA_PERSIST
          value: "False"
        - name: SGLANG_USE_AITER
          value: "1"
        - name: RCCL_MSCCL_ENABLE
          value: "0"
      extraPodSpec:
        mainContainer:
          image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
          command:
          - python3
          - -m
          - dynamo.sglang
          args:
            - --model-path
            - Qwen/Qwen3-0.6B
            - --tp-size
            - "1"
            - --page-size
            - "16"
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - mori
            - --trust-remote-code
          securityContext:
            privileged: true
          resources:
            requests:
              amd.com/gpu: "8"
            limits:
              amd.com/gpu: "8"
